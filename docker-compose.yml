services:
  aegis-verifier:
    build:
      context: ./verifier
    container_name: aegis-verifier
    environment:
      KEY_PROVIDER: env
      POLICY_ENGINE: rego
      POLICY_DIR: /etc/aegis/policies
      AEGIS_CLOUD_URL: http://host.docker.internal:3001/api/receipts
      AEGIS_LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      AEGIS_SIGNING_KEY_HEX: ${AEGIS_SIGNING_KEY_HEX:-}
    volumes:
      - ./policies:/etc/aegis/policies:ro
    ports:
      - "3000:3000"

  aegis-proxy:
    build:
      context: ./proxy
    container_name: aegis-proxy
    depends_on:
      - aegis-verifier
    environment:
      ENFORCE_MODE: strict
      POLICY_PATH: /etc/aegis/policy.json
      VERIFIER_URL: http://aegis-verifier:3000
      TRACE_WAL_PATH: /var/lib/aegis/proxy-trace.jsonl
      AEGIS_LOG_FORMAT: json
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - ./policy.json:/etc/aegis/policy.json:ro
      - proxy-data:/var/lib/aegis
    ports:
      - "8080:8080"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    env_file:
      - ./deploy/otel-collector.env.example
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - prometheus

  fluent-bit:
    image: fluent/fluent-bit:3.0
    profiles:
      - observability
    command: ["-i", "tail", "-p", "path=/var/lib/aegis/proxy-trace.jsonl", "-o", "forward", "-p", "host=otel-collector", "-p", "port=24224"]
    volumes:
      - proxy-data:/var/lib/aegis:ro
    depends_on:
      - otel-collector

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yaml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=aegis
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  proxy-data:
